data:
  format: "auto"                          # auto-detect from extension (.vhdr, .fif, .cnt)
  root: "raw"
  pattern: "sub-*_block*-task.fif"        # all participant blocks

montage: "standard_1020"                  # 10-20 names like Fz, Pz, Oz

blocks: [1, 5]                            # Blocks to compare (baseline vs fatigued)

behavioral_data: null                     # Path to d' CSV - set when available

# Study-level structure only.
# Algorithm settings live in eeg_pipeline/config/parameters.json.

# Theta extraction node (FM-theta power + ITF)
# Separate from h1_nodes - covers the frontal midline theta generators
nodes:
  CF: ['F1', 'Fz', 'F2', 'FCz', 'Cz']

# Revised node structure (PAC pilot rerun, 2026-03-04)
# C_broad: bilateral frontal->parietal (8+8 channels) - primary
# Fz->Pz: single-channel descriptive pair - subset of C_broad
# F_CR/P_CR removed (PAC went wrong direction with fatigue)
# LF/LP removed (no multiple comparisons needed)
h1_nodes:
  C_broad_F: ['Fz', 'FCz', 'F3', 'F4', 'FC1', 'FC2', 'FC3', 'FC4']   # bilateral frontal (8 ch)
  C_broad_P: ['Pz', 'POz', 'P3', 'P4', 'P1', 'P2', 'PO3', 'PO4']     # bilateral parietal (8 ch)
